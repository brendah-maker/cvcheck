<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Check | Beat the Robot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .navy-bg { background-color: #0f172a; }
        .yellow-text { color: #facc15; }
        .yellow-bg { background-color: #facc15; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-200">

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter text-white uppercase">CV<span class="yellow-text">Check</span></h1>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        
        <!-- STEP 1: INPUT -->
        <div id="step-1" class="space-y-12">
            <div class="text-center space-y-4">
                <h2 class="text-5xl md:text-7xl font-black text-white leading-tight">Is a Robot <br> <span class="yellow-text">rejecting your CV?</span></h2>
                <p class="text-slate-400 text-lg">Find your Match Score in 30 seconds for free.</p>
            </div>

            <form id="upload-form" class="grid md:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-[2.5rem]">
                    <label class="block text-[10px] font-black yellow-text uppercase tracking-widest mb-4">Job Description</label>
                    <textarea name="jd_text" id="jd_text" placeholder="Paste requirements..." class="w-full p-4 bg-slate-900/50 border-none rounded-2xl h-64 text-white text-sm focus:ring-2 focus:ring-yellow-500"></textarea>
                </div>
                <div class="glass p-8 rounded-[2.5rem]">
                    <label class="block text-[10px] font-black yellow-text uppercase tracking-widest mb-4">Your CV (PDF)</label>
                    <input type="file" name="cv_file" id="cv_file" accept=".pdf" class="w-full text-xs text-slate-400 mb-6">
                    <textarea name="cv_text" id="cv_text" placeholder="Or paste CV text..." class="w-full p-4 bg-slate-900/50 border-none rounded-2xl h-44 text-white text-sm focus:ring-2 focus:ring-yellow-500"></textarea>
                </div>
                <button type="button" onclick="startAnalysis()" class="md:col-span-2 w-full yellow-bg text-slate-900 font-black py-6 rounded-3xl uppercase tracking-widest text-lg hover:scale-[1.01] transition-all">Check My Match Score (FREE)</button>
            </form>
        </div>

        <!-- LOADING SCREEN -->
        <div id="loading-screen" class="hidden text-center py-20">
            <div class="inline-block w-20 h-20 border-8 border-yellow-500 border-t-transparent rounded-full animate-spin mb-8"></div>
            <p id="loading-text" class="text-xl font-black yellow-text uppercase tracking-widest">AI analyzing your match...</p>
        </div>

        <!-- STEP 2: RESULTS & PAYMENT AREA -->
        <div id="step-2" class="hidden animate-up">
            <div class="bg-white rounded-[3.5rem] overflow-hidden shadow-2xl">
                <div class="navy-bg p-12 text-center">
                    <p class="text-[10px] font-black yellow-text uppercase tracking-widest mb-4">ATS Match Score</p>
                    <h3 id="score" class="text-9xl font-black text-white tracking-tighter">0%</h3>
                    <p id="verdict" class="text-slate-400 mt-6 italic text-lg"></p>
                </div>
                
                <div class="p-10 bg-white space-y-8 text-slate-900">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-red-50 p-6 rounded-3xl border border-red-100 text-center">
                            <p class="text-[10px] font-bold text-red-400 uppercase tracking-widest">Visibility</p>
                            <p id="visibility" class="text-lg font-black text-red-600">--</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                            <p id="k-count" class="text-2xl font-black text-slate-900">0</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Keyword Gaps</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center flex flex-col justify-center items-center">
                            <p id="e-text" class="text-xs font-bold text-slate-800 leading-tight uppercase px-2">Scanning...</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Critical Issue</p>
                        </div>
                    </div>

                    <!-- PACKAGE OPTIONS -->
                    <div id="package-selector" class="bg-slate-900 p-8 rounded-[3rem] space-y-4">
                        <p class="text-white text-center text-[10px] font-black uppercase tracking-widest opacity-60">Unlock Full Report</p>
                        <div class="grid md:grid-cols-2 gap-4">
                            <button onclick="showPaymentField(20, 'Diagnostic')" class="p-6 border-2 border-slate-700 rounded-3xl text-left hover:border-yellow-500 transition-all">
                                <b class="block text-white text-lg">Diagnostic</b>
                                <b class="block mt-4 text-xl yellow-text">Ksh 20</b>
                            </button>
                            <button onclick="showPaymentField(60, 'Pro Bundle')" class="p-6 border-2 border-yellow-500 rounded-3xl text-left bg-yellow-500/10 hover:bg-yellow-500/20 transition-all">
                                <b class="block text-white text-lg">Pro Bundle</b>
                                <b class="block mt-4 text-xl yellow-text">Ksh 60</b>
                            </button>
                        </div>
                    </div>

                    <!-- PHONE INPUT AREA -->
                    <div id="phone-input-area" class="hidden bg-slate-900 p-8 rounded-[3rem] space-y-6 animate-up text-center">
                        <div>
                            <p class="text-white font-black uppercase tracking-widest text-xs">Unlock <span id="target-pack-name" class="yellow-text"></span> Report</p>
                            <p class="text-slate-500 text-[10px] mt-1">Enter M-Pesa Number below</p>
                        </div>
                        <div class="flex flex-col md:flex-row gap-3">
                            <input type="tel" id="user_phone" placeholder="07XXXXXXXX" class="flex-1 p-5 bg-slate-800 border-none rounded-2xl text-white text-center text-xl font-bold focus:ring-2 focus:ring-yellow-500">
                            <button id="pay-btn" onclick="processPayment()" class="yellow-bg text-slate-900 font-black px-10 py-5 rounded-2xl uppercase tracking-widest shadow-xl hover:scale-95 transition-all">Pay Now</button>
                        </div>
                        <button onclick="hidePaymentField()" class="text-slate-500 text-[10px] uppercase font-bold hover:text-white">Back to packages</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- FINAL REPORT -->
        <div id="final-report" class="hidden mt-12 space-y-6 pb-24">
            <div class="glass p-10 rounded-[3rem] shadow-2xl" id="report-content"></div>
            <button onclick="location.reload()" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px] tracking-widest">Analyze Another Job</button>
        </div>

    </main>

<script>
    let rawJD = "", rawCV = "";
    let activeAmount = 0, activePack = "";

    async function startAnalysis() {
        rawJD = document.getElementById('jd_text').value;
        rawCV = document.getElementById('cv_text').value;
        const form = document.getElementById('upload-form');
        const formData = new FormData(form);
        
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('loading-screen').classList.remove('hidden');

        try {
            const res = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await res.json();
            
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            
            // --- JS NaN SAFETY ---
            const numericScore = parseInt(data.score);
            document.getElementById('score').innerText = (isNaN(numericScore) ? 0 : numericScore) + "%";
            
            document.getElementById('k-count').innerText = data.missing_count || 0;
            document.getElementById('e-text').innerText = data.error_text || "No major issues";
            document.getElementById('verdict').innerText = data.verdict || "";
            document.getElementById('visibility').innerText = data.visibility || "LOW";
        } catch (e) {
            console.error(e);
            alert("Analysis failed. Please refresh and try again.");
            location.reload(); 
        }
    }

    function showPaymentField(amt, name) {
        activeAmount = amt;
        activePack = name;
        document.getElementById('target-pack-name').innerText = name.toUpperCase();
        document.getElementById('package-selector').classList.add('hidden');
        document.getElementById('phone-input-area').classList.remove('hidden');
    }

    function hidePaymentField() {
        document.getElementById('package-selector').classList.remove('hidden');
        document.getElementById('phone-input-area').classList.add('hidden');
    }

    async function processPayment() {
        const phone = document.getElementById('user_phone').value;
        if(phone.length < 10) return alert("Enter a valid M-Pesa number (e.g. 0712345678)");

        const btn = document.getElementById('pay-btn');
        const originalText = btn.innerText;
        btn.innerText = "Requesting...";
        btn.disabled = true;

        try {
            const configRes = await fetch('/get-payment-config');
            const config = await configRes.json();
            
            const intasend = new window.IntaSend({
                public_key: config.public_key,
                live: false // CHANGE TO true ONLY WHEN READY FOR REAL MONEY
            });

            intasend.run({
                amount: activeAmount,
                currency: "KES",
                label: `CV Check: ${activePack}`,
                phone_number: phone,
                email: "customer@cvcheck.co.ke"
            })
            .on("COMPLETE", () => unlockFinalReport())
            .on("FAILED", () => {
                alert("Payment was not successful.");
                btn.innerText = originalText;
                btn.disabled = false;
            })
            .on("IN-PROGRESS", () => {
                console.log("Waiting for prompt...");
            });
        } catch (err) { 
            alert("Payment system error.");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    async function unlockFinalReport() {
        document.getElementById('step-2').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('loading-screen').classList.remove('hidden');
        document.getElementById('loading-text').innerText = "AI is writing your custom report...";

        try {
            const res = await fetch('/generate-docs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({jd: rawJD, cv: rawCV})
            });
            const data = await res.json();

            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('final-report').classList.remove('hidden');
            
            let html = `<h4 class="text-3xl font-black text-white mb-10 uppercase">${activePack}</h4>`;
            html += `<div class="p-8 bg-slate-800 rounded-3xl border border-slate-700 mb-6"><b class="yellow-text text-[10px] uppercase block mb-4">Keywords to include</b><p class="text-white text-2xl font-bold">${data.keywords.join(" • ")}</p></div>`;

            if(activeAmount >= 60) {
                html += `
                    <div class="p-8 bg-slate-800 rounded-3xl border border-slate-700 mb-6">
                        <b class="yellow-text text-[10px] uppercase block mb-4">Job-Match Strategy</b>
                        <p class="text-slate-300 text-sm leading-relaxed">${data.summary}</p>
                    </div>
                    <div class="p-10 bg-white rounded-[2.5rem] text-slate-900 shadow-xl">
                        <b class="text-blue-600 text-[10px] uppercase font-black block mb-6">Optimized Cover Letter</b>
                        <pre class="whitespace-pre-wrap font-sans text-sm leading-relaxed">${data.cover_letter}</pre>
                    </div>`;
            }
            document.getElementById('report-content').innerHTML = html;
            document.getElementById('final-report').scrollIntoView({ behavior: 'smooth' });
        } catch (e) { 
            alert("Error generating report. Please refresh."); 
        }
    }
</script>
</body>
</html>
