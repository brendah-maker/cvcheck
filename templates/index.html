<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVCheck | Free AI ATS Diagnostic & Match Score</title>
    <meta name="description" content="Stop getting rejected by robots. Use our Llama-3.3 AI to scan your CV and Cover Letter against any job description for instant ATS gap analysis.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 6; }
        .circle-progress { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dasharray 1.2s ease, stroke 0.5s ease; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* New styling for bullet points in strategy */
        #strategy-display ul { list-style-type: none; padding: 0; }
        #strategy-display li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        #strategy-display li::before { content: '→'; position: absolute; left: 0; color: #6366f1; font-weight: bold; }
    </style>
</head>
<body class="selection:bg-indigo-100">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter text-slate-900 flex items-center gap-2">
                <div class="w-6 h-6 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-200"></div>
                CV<span class="text-indigo-600">CHECK</span>
            </h1>
            <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                <a href="#how-it-works" class="hover:text-indigo-600 transition">Methodology</a>
                <a href="#faq" class="hover:text-indigo-600 transition">FAQ</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-16 pb-32">
        
        <header id="input-section" class="text-center space-y-8 mb-20 fade-in">
            <div class="space-y-4">
                <span class="px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase tracking-widest border border-indigo-100">AI-Powered Diagnostic v2.1</span>
                <h2 class="text-5xl md:text-8xl font-extrabold text-slate-900 leading-tight tracking-tight">Beat the <span class="text-indigo-600">Bots.</span></h2>
                <p class="text-slate-500 text-lg max-w-2xl mx-auto">Optimize your Resume and Cover Letter for modern ATS algorithms. 100% Free.</p>
            </div>
            
            <form id="upload-form" class="grid md:grid-cols-2 gap-6 text-left">
                <div class="glass p-6 rounded-[2rem]">
                    <label class="block text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-3">1. Target Job Description</label>
                    <textarea id="jd_text" name="jd_text" required placeholder="Paste the job requirements here..." class="w-full p-5 bg-white border border-slate-200 rounded-2xl h-[460px] text-slate-700 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                </div>

                <div class="space-y-6">
                    <div id="drop-zone" class="glass p-6 rounded-[2rem] border-2 border-transparent transition-all">
                        <label class="block text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-3">2. Your Professional Resume</label>
                        <div class="relative group cursor-pointer mb-4 p-8 border-2 border-dashed border-slate-200 rounded-2xl text-center hover:border-indigo-400 transition-colors">
                            <input type="file" id="cv_file" name="cv_file" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <p id="file-name" class="text-sm text-slate-500 font-bold">Drag & Drop PDF or <span class="text-indigo-600">Browse</span></p>
                        </div>
                        <textarea id="cv_text" name="cv_text" placeholder="Or paste resume text here..." class="w-full p-5 bg-white border border-slate-200 rounded-2xl h-32 text-slate-700 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                    </div>

                    <div class="glass p-6 rounded-[2rem]">
                        <label class="block text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-3">3. Cover Letter (Optional)</label>
                        <textarea id="cl_text" name="cl_text" placeholder="Paste your cover letter to optimize it for keywords..." class="w-full p-5 bg-white border border-slate-200 rounded-2xl h-32 text-slate-700 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
                    </div>
                </div>

                <button type="button" id="scan-btn" onclick="runDiagnostic()" class="md:col-span-2 w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl uppercase tracking-widest text-sm hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200">
                    Initiate Deep Scan
                </button>
            </form>
        </header>

        <article id="results-section" class="hidden space-y-8 fade-in">
            <div class="grid md:grid-cols-3 gap-6">
                <div class="glass p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center">
                    <div class="relative mb-4">
                        <svg class="w-32 h-32 transform -rotate-90">
                            <circle class="circle-bg" cx="64" cy="64" r="58"></circle>
                            <circle id="score-circle" class="circle-progress" cx="64" cy="64" r="58" stroke-dasharray="0 364"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="score-text" class="text-3xl font-black text-slate-900">0%</span>
                        </div>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Match Accuracy</p>
                </div>

                <div class="md:col-span-2 glass p-8 rounded-[2.5rem] flex flex-col justify-center">
                    <div class="flex items-center gap-3 mb-4">
                        <p id="visibility-badge" class="inline-block px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest"></p>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">• AI Confidence: 98.2%</span>
                    </div>
                    <h3 id="verdict-display" class="text-3xl font-bold text-slate-900 leading-tight"></h3>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <section class="glass p-8 rounded-[2.5rem]">
                    <h4 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-6">Skill Gaps (Critical Keywords)</h4>
                    <div id="keywords-list" class="flex flex-wrap gap-2"></div>
                </section>
                
                <section class="glass p-8 rounded-[2.5rem] relative min-h-[300px]">
                    <h4 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-6">Optimization Roadmap</h4>
                    <div id="strategy-display" class="text-slate-600 text-sm leading-relaxed mb-16">
                        </div>
                    <div class="absolute bottom-6 left-8 right-8 flex justify-between items-center">
                         <button onclick="copyFullReport()" class="bg-slate-900 text-white text-[10px] px-6 py-3 rounded-xl font-bold uppercase tracking-widest hover:bg-indigo-600 transition">
                            Copy Strategy
                        </button>
                    </div>
                </section>
            </div>
            
            <div class="text-center pt-8">
                <button onclick="window.location.reload()" class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] hover:text-indigo-600 transition">← Reset Analysis</button>
            </div>
        </article>

        </main>

    <script>
        // ... (Keep existing File handling logic) ...

        function renderResults(data) {
            const score = data.score || 0;
            const scoreCircle = document.getElementById('score-circle');
            const scoreText = document.getElementById('score-text');
            const circumference = 2 * Math.PI * 58;

            scoreText.innerText = score + "%";
            document.getElementById('verdict-display').innerText = data.verdict;

            // TRANSFORM STRATEGY INTO BULLET POINTS
            const strategyDisplay = document.getElementById('strategy-display');
            const strategySteps = data.strategy.split('.').filter(s => s.trim().length > 0);
            let strategyHTML = '<ul>';
            strategySteps.forEach(step => {
                strategyHTML += `<li>${step.trim()}.</li>`;
            });
            strategyHTML += '</ul>';
            strategyDisplay.innerHTML = strategyHTML;

            let color = "#ef4444"; 
            if (score > 40) color = "#f59e0b"; 
            if (score > 70) color = "#10b981"; 

            scoreCircle.style.stroke = color;
            scoreCircle.style.strokeDasharray = `${circumference} ${circumference}`;
            scoreCircle.style.strokeDashoffset = circumference - (score / 100) * circumference;

            const badge = document.getElementById('visibility-badge');
            badge.innerText = data.visibility + " Visibility";
            badge.style.backgroundColor = color + "15";
            badge.style.color = color;
            badge.style.border = `1px solid ${color}30`;

            const kwList = document.getElementById('keywords-list');
            kwList.innerHTML = '';
            data.missing_keywords.forEach(kw => {
                const el = document.createElement('span');
                el.className = "px-3 py-2 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-xl text-xs font-bold";
                el.innerText = "+ " + kw;
                kwList.appendChild(el);
            });

            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
        
        // ... (Keep existing copyFullReport & runDiagnostic) ...
    </script>
</body>
</html>
