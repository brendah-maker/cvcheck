<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Check | Beat the Robot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- IntaSend SDK -->
    <script src="https://unpkg.com/intasend-inlinejs-sdk@3.0.4/build/intasend-inline.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; scroll-behavior: smooth; }
        .navy-bg { background-color: #0f172a; }
        .yellow-text { color: #facc15; }
        .yellow-bg { background-color: #facc15; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-slate-200">

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter text-white uppercase">CV<span class="yellow-text">Check</span></h1>
        <div class="text-[10px] font-black bg-slate-800 px-4 py-2 rounded-full border border-slate-700 tracking-widest text-slate-400">LLAMA-3 POWERED</div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        
        <!-- PHASE 1: THE LANDING -->
        <div id="step-1" class="space-y-12">
            <div class="text-center space-y-4">
                <h2 class="text-5xl md:text-7xl font-black text-white leading-tight">Is a Robot <br> <span class="yellow-text">rejecting your CV?</span></h2>
                <p class="text-slate-400 text-lg">Find your Match Score in 30 seconds for free.</p>
            </div>

            <form id="upload-form" class="grid md:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-[2.5rem]">
                    <label class="block text-[10px] font-black yellow-text uppercase tracking-widest mb-4">Job Description</label>
                    <textarea name="jd_text" id="jd_text" placeholder="Paste the job description here..." class="w-full p-4 bg-slate-900/50 border-none rounded-2xl h-64 text-white text-sm focus:ring-2 focus:ring-yellow-500"></textarea>
                </div>

                <div class="glass p-8 rounded-[2.5rem]">
                    <label class="block text-[10px] font-black yellow-text uppercase tracking-widest mb-4">Your CV (PDF)</label>
                    <input type="file" name="cv_file" id="cv_file" accept=".pdf" class="w-full text-xs text-slate-400 mb-6">
                    <textarea name="cv_text" id="cv_text" placeholder="Or paste CV text here..." class="w-full p-4 bg-slate-900/50 border-none rounded-2xl h-44 text-white text-sm focus:ring-2 focus:ring-yellow-500"></textarea>
                </div>

                <button type="button" onclick="startAnalysis()" id="analyze-btn" class="md:col-span-2 w-full yellow-bg text-slate-900 font-black py-6 rounded-3xl uppercase tracking-widest text-lg shadow-2xl shadow-yellow-500/20 hover:scale-[1.01] transition-all">
                    Check My Match Score (FREE)
                </button>
            </form>
        </div>

        <!-- PHASE 2: LOADING SCREEN -->
        <div id="loading-screen" class="hidden text-center py-20 space-y-8 animate-pulse">
            <div class="inline-block w-20 h-20 border-8 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
            <p id="loading-text" class="text-xl font-black yellow-text uppercase tracking-widest">Analyzing Requirements...</p>
        </div>

        <!-- PHASE 3: THE TEASER & UPSELL -->
        <div id="step-2" class="hidden animate-in zoom-in duration-500">
            <div class="bg-white rounded-[3.5rem] overflow-hidden shadow-2xl">
                <div class="navy-bg p-16 text-center">
                    <p class="text-[10px] font-black yellow-text uppercase tracking-widest mb-4">ATS Match Score</p>
                    <h3 id="score" class="text-9xl font-black text-white tracking-tighter">0%</h3>
                    <p id="verdict" class="text-slate-400 mt-6 italic text-lg"></p>
                </div>
                
                <div class="p-10 bg-white space-y-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-red-50 p-8 rounded-[2rem] text-center border border-red-100">
                            <p id="k-count" class="text-4xl font-black text-red-600">0</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Critical Gaps</p>
                        </div>
                        <div class="bg-orange-50 p-8 rounded-[2rem] text-center border border-orange-100">
                            <p id="e-count" class="text-4xl font-black text-orange-600">0</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Format Errors</p>
                        </div>
                    </div>

                    <div class="bg-slate-900 p-10 rounded-[3rem] space-y-6">
                        <p class="text-white text-center font-bold">Only candidates with 80%+ scores usually get called. Fix yours now.</p>
                        <div class="grid md:grid-cols-2 gap-6">
                            <button onclick="handlePayment(20, 'Diagnostic')" class="p-8 border-2 border-slate-700 rounded-3xl text-left hover:border-yellow-500 transition-all group">
                                <b class="block text-white text-xl">Diagnostic</b>
                                <span class="text-slate-400 text-xs">Reveal all missing keywords.</span>
                                <b class="block mt-4 text-2xl yellow-text">Ksh 20</b>
                            </button>
                            <button onclick="handlePayment(60, 'Pro Bundle')" class="p-8 border-2 border-yellow-500 rounded-3xl text-left bg-yellow-500/5 hover:bg-yellow-500/10 transition-all relative">
                                <span class="absolute -top-3 right-6 bg-yellow-500 text-navy-bg text-[10px] font-black px-3 py-1 rounded-full uppercase">Best Choice</span>
                                <b class="block text-white text-xl">Pro Bundle</b>
                                <span class="text-slate-400 text-xs">AI CV, Cover Letter & Prep.</span>
                                <b class="block mt-4 text-2xl yellow-text">Ksh 60</b>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PHASE 4: FINAL DELIVERY -->
        <div id="final-report" class="hidden mt-12 space-y-6 pb-24">
            <div class="glass p-10 rounded-[3rem] shadow-2xl" id="report-content"></div>
            <button onclick="location.reload()" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px] tracking-widest">Analyze Another Job</button>
        </div>

    </main>

    <script>
        let rawJD = ""; let rawCV = "";

        function startAnalysis() {
            rawJD = document.getElementById('jd_text').value;
            rawCV = document.getElementById('cv_text').value;

            if(!rawJD) { alert("Please paste the Job Description"); return; }
            
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            const loader = document.getElementById('loading-text');
            const msgs = ["Analyzing Requirements...", "Scanning CV Keywords...", "Checking ATS Compatibility...", "Finalizing Score..."];
            let i = 0;
            const interval = setInterval(() => { loader.innerText = msgs[i % msgs.length]; i++; }, 1000);

            processAnalysis(interval);
        }

        async function processAnalysis(interval) {
            const formData = new FormData(document.getElementById('upload-form'));
            try {
                const res = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await res.json();
                
                setTimeout(() => {
                    clearInterval(interval);
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    document.getElementById('score').innerText = (data.score || 0) + "%";
                    document.getElementById('k-count').innerText = data.missing_count || 0;
                    document.getElementById('e-count').innerText = data.errors || 0;
                    document.getElementById('verdict').innerText = data.verdict || "Low Visibility";
                }, 4000); 
            } catch (e) { alert("AI Error. Refreshing..."); location.reload(); }
        }

        function handlePayment(amount, packName) {
            // Initialize Intasend Inline
            const intasend = new window.IntaSend({
                public_key: "YOUR_INTASEND_PUBLIC_KEY", // Get from intasend.com
                live: false // Set to true when ready
            });

            intasend.on("COMPLETE", (results) => {
                unlockResults(amount, packName);
            })
            .on("FAILED", () => alert("Payment failed. Try again."))
            .run({
                amount: amount,
                currency: "KES",
                label: `CV Check: ${packName}`,
                email: "customer@cvcheck.co.ke"
            });
        }

        async function unlockResults(amount, packName) {
            document.getElementById('step-2').classList.add('opacity-20', 'pointer-events-none');
            try {
                const res = await fetch('/generate-docs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({jd: rawJD, cv: rawCV})
                });
                const data = await res.json();

                document.getElementById('final-report').classList.remove('hidden');
                let html = `<h4 class="text-3xl font-black text-white mb-10 uppercase tracking-tighter">${packName} Results</h4>`;
                
                // Keywords (Unlocked for both tiers)
                html += `<div class="p-8 bg-slate-800 rounded-3xl border border-slate-700 mb-6">
                    <b class="yellow-text text-[10px] uppercase block mb-4 tracking-widest">Critical Missing Keywords</b>
                    <p class="text-white text-2xl font-bold leading-relaxed">${data.keywords.join(" • ")}</p>
                </div>`;

                // Summary & Cover Letter (Unlocked for Pro Bundle only)
                if(amount >= 60) {
                    html += `
                    <div class="p-8 bg-slate-800 rounded-3xl border border-slate-700 mb-6">
                        <b class="yellow-text text-[10px] uppercase block mb-4 tracking-widest">AI Optimized Professional Summary</b>
                        <p class="text-slate-300 leading-relaxed">${data.summary}</p>
                    </div>
                    <div class="p-10 bg-white rounded-[2.5rem] text-slate-900 shadow-xl">
                        <b class="text-blue-600 text-[10px] uppercase font-black block mb-6 tracking-widest">Tailored Cover Letter</b>
                        <pre class="whitespace-pre-wrap font-sans text-sm leading-relaxed">${data.cover_letter}</pre>
                    </div>`;
                }

                document.getElementById('report-content').innerHTML = html;
                document.getElementById('final-report').scrollIntoView({ behavior: 'smooth' });
            } catch (e) { alert("Error generating docs."); }
        }
    </script>
</body>
</html>
