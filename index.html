<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Check | Beat the ATS Robot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="p-6 max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tight text-blue-600">CVCHECK.ke</h1>
        <span class="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase">Beta</span>
    </nav>

    <main class="max-w-xl mx-auto px-4 py-8">
        <!-- STEP 1: INPUT -->
        <div id="step-1" class="space-y-8">
            <div class="text-center">
                <h2 class="text-4xl font-extrabold mb-3 leading-tight">Land your dream job.</h2>
                <p class="text-slate-500">We analyze your CV against the job description using AI.</p>
            </div>

            <form id="upload-form" class="space-y-6 bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <div>
                    <label class="block text-sm font-bold mb-2 uppercase text-slate-400">1. The Job Link or Text</label>
                    <input type="url" name="job_url" id="job_url" placeholder="Paste LinkedIn/Indeed Link..." 
                           class="w-full p-4 bg-slate-50 border-none rounded-2xl mb-2 focus:ring-2 focus:ring-blue-500">
                    <textarea name="jd_text" id="jd_text" placeholder="...or paste the job description text here" 
                              class="w-full p-4 bg-slate-50 border-none rounded-2xl h-24 focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 uppercase text-slate-400">2. Your CV (PDF or Text)</label>
                    <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:border-blue-400 transition-colors bg-slate-50">
                        <input type="file" name="cv_file" id="cv_file" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <p id="file-label" class="text-blue-600 font-bold">Click to upload CV (PDF)</p>
                    </div>
                    <textarea name="cv_text" id="cv_text" placeholder="...or paste your CV text here" 
                              class="w-full p-4 bg-slate-50 border-none rounded-2xl h-32 mt-4 focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <button type="button" onclick="handleAnalysis()" id="analyze-btn" class="w-full bg-blue-600 text-white font-extrabold py-5 rounded-2xl shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest">
                    Run AI Check (Free)
                </button>
            </form>
        </div>

        <!-- STEP 2: RESULTS -->
        <div id="step-2" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 text-center">
                <p class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Match Score</p>
                <h3 id="score" class="text-9xl font-black mb-8 tracking-tighter">0%</h3>
                
                <div class="flex gap-4 mb-10">
                    <div class="flex-1 bg-red-50 p-6 rounded-3xl">
                        <p id="k-count" class="text-3xl font-black text-red-600">0</p>
                        <p class="text-[10px] font-bold text-red-400 uppercase">Missing Skills</p>
                    </div>
                    <div class="flex-1 bg-orange-50 p-6 rounded-3xl">
                        <p id="e-count" class="text-3xl font-black text-orange-600">0</p>
                        <p class="text-[10px] font-bold text-orange-400 uppercase">System Errors</p>
                    </div>
                </div>

                <div class="bg-blue-600 p-8 rounded-[2rem] text-white">
                    <p class="font-bold mb-6 text-lg">Your CV is missing critical keywords. HR will likely skip you.</p>
                    <button onclick="generateDocs()" id="pay-btn" class="w-full bg-white text-blue-600 font-black py-5 rounded-2xl hover:bg-slate-100 shadow-xl uppercase tracking-tighter">
                        Get Optimized CV & Letter (Ksh 60)
                    </button>
                </div>
            </div>
        </div>

        <!-- STEP 3: FINAL REPORT -->
        <div id="final-report" class="hidden mt-10 space-y-6">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <h4 class="font-black text-xl mb-6 flex items-center gap-2">
                    <span class="bg-green-100 text-green-600 p-2 rounded-lg">✓</span> Optimization Success
                </h4>
                <div id="report-body" class="space-y-6 text-slate-600">
                    <!-- Data injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let rawJD = ""; 
        let rawCV = "";

        document.getElementById('cv_file').onchange = function() {
            document.getElementById('file-label').innerText = "Selected: " + this.files[0].name;
        };

        async function handleAnalysis() {
            const btn = document.getElementById('analyze-btn');
            const formData = new FormData(document.getElementById('upload-form'));
            
            // Save raw text for the 60-bob step
            rawJD = document.getElementById('jd_text').value || document.getElementById('job_url').value;
            rawCV = document.getElementById('cv_text').value;

            btn.innerText = "Analyzing CV...";
            btn.disabled = true;

            try {
                const res = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await res.json();
                
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                document.getElementById('score').innerText = data.score + "%";
                document.getElementById('k-count').innerText = data.missing_count;
                document.getElementById('e-count').innerText = data.errors;
            } catch (e) { alert("Error analyzing. Please paste text directly."); }
        }

        async function generateDocs() {
            const phone = prompt("Enter M-Pesa Number (07...):");
            if(!phone) return;

            const payBtn = document.getElementById('pay-btn');
            payBtn.innerText = "Generating Documents...";
            
            const res = await fetch('/generate-docs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({jd: rawJD, cv: rawCV})
            });
            const data = await res.json();

            document.getElementById('step-2').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('final-report').classList.remove('hidden');
            document.getElementById('report-body').innerHTML = `
                <div class="p-5 bg-slate-50 rounded-2xl">
                    <b class="text-blue-600 text-xs uppercase tracking-widest">Keywords to Add</b>
                    <p class="mt-2 font-bold text-slate-800">${data.keywords.join(", ")}</p>
                </div>
                <div class="p-5 bg-slate-50 rounded-2xl">
                    <b class="text-blue-600 text-xs uppercase tracking-widest">Professional Summary</b>
                    <p class="mt-2 text-slate-700">${data.summary}</p>
                </div>
                <div class="p-5 bg-slate-50 rounded-2xl">
                    <b class="text-blue-600 text-xs uppercase tracking-widest">Tailored Cover Letter</b>
                    <pre class="mt-4 whitespace-pre-wrap font-sans text-xs bg-white p-6 border rounded-2xl italic shadow-inner">${data.cover_letter}</pre>
                </div>
            `;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
